<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel - Lado Women Foundation</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* HEADER */
.header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

/* LAYOUT */
.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#1f2937;
color:white;
padding:10px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin:5px 0;
border-radius:5px;
}

.sidebar a:hover{
background:#374151;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{font-size:13px;color:gray}
.card span{font-size:24px;color:#2563eb;font-weight:bold}

/* TABLE */
table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border:1px solid #ddd;
font-size:13px;
}

th{
background:#2563eb;
color:white;
}

/* CHART */
.chartBox{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

button{
padding:8px 12px;
border:none;
background:#2563eb;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h2>ADMIN PANEL - MIS CONTROL</h2>
<div>Director Access</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>MENU</h3>

<a onclick="loadDashboard()">📊 Dashboard</a>
<a onclick="loadMembers()">👩 Members</a>
<a onclick="loadChart()">📈 Analytics</a>
<a href="index.html">🏠 Website</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- CARDS -->
<div class="cards">

<div class="card">
<h3>Total Members</h3>
<span id="m">0</span>
</div>

<div class="card">
<h3>Districts</h3>
<span>33</span>
</div>

<div class="card">
<h3>Blocks</h3>
<span>0</span>
</div>

<div class="card">
<h3>Trainings</h3>
<span id="t">0</span>
</div>

</div>

<!-- ACTION -->
<button onclick="loadMembers()">Refresh Members</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>District</th>
<th>Block</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<!-- CHART -->
<div class="chartBox">
<h3>District Wise Analytics</h3>
<canvas id="chart"></canvas>
</div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwettPIRLCY97iovedPaKisdtCMiPIc44ZlDfmz7D69n9-bX9JP6x0iRTrMrMAzFgjn/exec";

let membersData = [];

// ================= DASHBOARD =================
async function loadDashboard(){

let res = await fetch(API);
let d = await res.json();

document.getElementById("m").innerText = d.totalMembers || 0;

}

// ================= MEMBERS =================
async function loadMembers(){

let res = await fetch(API + "?action=members");
membersData = await res.json();

renderTable(membersData);
}

// ================= TABLE =================
function renderTable(data){

let tbody = document.getElementById("table");
tbody.innerHTML = "";

data.forEach(m=>{

tbody.innerHTML += `
<tr>
<td>${m.fullName || ""}</td>
<td>${m.mobile || ""}</td>
<td>${m.district || ""}</td>
<td>${m.block || ""}</td>
</tr>
`;

});

}

// ================= CHART =================
async function loadChart(){

let res = await fetch(API + "?action=charts");
let data = await res.json();

let labels = Object.keys(data.districts);
let values = Object.values(data.districts);

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Members",
data:values,
backgroundColor:"#2563eb"
}]
}
});

}

// INIT
loadDashboard();
loadMembers();
loadChart();

</script>

</body>
</html>
