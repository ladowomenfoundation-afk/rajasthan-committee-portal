<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rajasthan NGO MIS Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
  display:flex;
}

/* LEFT PANEL */
.left{
  width:260px;
  background:#0f172a;
  color:white;
  height:100vh;
  position:fixed;
  padding:15px;
  overflow:auto;
}

.left h2{
  font-size:18px;
  margin-bottom:10px;
}

.map{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

.district{
  padding:10px;
  margin:5px 0;
  background:#1e293b;
  border-radius:6px;
  cursor:pointer;
}

.district:hover{
  background:#334155;
}

/* MAIN */
.main{
  margin-left:280px;
  padding:20px;
  width:100%;
}

.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:15px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card h3{
  font-size:13px;
  color:gray;
}

.card p{
  font-size:26px;
  color:#2563eb;
  font-weight:bold;
}

/* TABLE */
.table{
  margin-top:20px;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border:1px solid #ddd;
  font-size:13px;
}

th{
  background:#2563eb;
  color:white;
}

@media(max-width:900px){
  .cards{grid-template-columns:1fr 1fr;}
  body{flex-direction:column;}
  .left{position:relative;width:100%;height:auto;}
  .main{margin-left:0;}
}
</style>
</head>

<body>

<!-- LEFT PANEL -->
<div class="left">

<h2>🇮🇳 Rajasthan MIS</h2>

<!-- Rajasthan Map Image -->
<img class="map" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Rajasthan_in_India.svg/512px-Rajasthan_in_India.svg.png">

<div id="districtList">
Loading districts...
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="title" id="title">Dashboard Overview</div>

<div class="cards">

<div class="card">
<h3>Total Members</h3>
<p id="members">0</p>
</div>

<div class="card">
<h3>District Committee</h3>
<p id="districtCount">0</p>
</div>

<div class="card">
<h3>Block Committee</h3>
<p id="blockCount">0</p>
</div>

<div class="card">
<h3>Trainings</h3>
<p id="training">0</p>
</div>

</div>

<!-- TABLE -->
<div class="table">
<h3>District Wise Team</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>District</th>
<th>Block</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

</div>

<script>

// 🔥 YOUR APPS SCRIPT URL
const API = "YOUR_SCRIPT_URL_HERE";

// Rajasthan districts (static list)
const districts = [
"Ajmer","Alwar","Banswara","Baran","Barmer","Bharatpur","Bhilwara",
"Bikaner","Bundi","Chittorgarh","Churu","Dausa","Dholpur","Dungarpur",
"Hanumangarh","Jaipur","Jaisalmer","Jalore","Jhalawar","Jhunjhunu",
"Jodhpur","Karauli","Kota","Nagaur","Pali","Pratapgarh","Rajsamand",
"Sawai Madhopur","Sikar","Sirohi","Sri Ganganagar","Tonk","Udaipur"
];

// LOAD DISTRICTS
function loadDistricts(){
  let box = document.getElementById("districtList");
  box.innerHTML = "";

  districts.forEach(d => {
    box.innerHTML += <div class="district" onclick="filterDistrict('${d}')">${d}</div>;
  });
}

// LOAD DATA
async function loadData(){

  let res = await fetch(API + "?action=members");
  let data = await res.json();

  window.allData = data;

  document.getElementById("members").innerText = data.length;

  renderTable(data);
}

// TABLE RENDER
function renderTable(data){

  let tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(m => {
    tbody.innerHTML += `
      <tr>
        <td>${m.name || ""}</td>
        <td>${m.mobile || ""}</td>
        <td>${m.district || ""}</td>
        <td>${m.block || ""}</td>
      </tr>
    `;
  });
}

// FILTER BY DISTRICT
function filterDistrict(d){

  document.getElementById("title").innerText = d + " District Team";

  let filtered = window.allData.filter(x => x.district == d);

  renderTable(filtered);
}

// INIT
loadDistricts();
loadData();

</script>

</body>
</html>
