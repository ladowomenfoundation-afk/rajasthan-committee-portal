<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lado Women Foundation MIS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* HEADER */
.header{
  background:#111827;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  align-items:center;
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
}

.menu a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  cursor:pointer;
}

/* DROPDOWN PANEL */
.dropdown{
  position:fixed;
  top:50px;
  left:0;
  width:300px;
  height:100%;
  background:#1f2937;
  color:white;
  overflow:auto;
  display:none;
  padding:10px;
}

.dropdown h3{
  color:#fff;
}

.item{
  padding:8px;
  margin:5px 0;
  background:#111827;
  cursor:pointer;
  border-radius:5px;
}

.item:hover{
  background:#374151;
}

/* MAIN */
.main{
  margin-top:70px;
  padding:20px;
}

/* SLIDER 10 IMAGES */
.slider{
  width:100%;
  height:350px;
  overflow:hidden;
  border-radius:10px;
  position:relative;
}

.slider img{
  width:100%;
  height:350px;
  object-fit:cover;
  position:absolute;
  animation:fade 25s infinite;
  opacity:0;
}

.slider img:nth-child(1){animation-delay:0s;}
.slider img:nth-child(2){animation-delay:2.5s;}
.slider img:nth-child(3){animation-delay:5s;}
.slider img:nth-child(4){animation-delay:7.5s;}
.slider img:nth-child(5){animation-delay:10s;}
.slider img:nth-child(6){animation-delay:12.5s;}
.slider img:nth-child(7){animation-delay:15s;}
.slider img:nth-child(8){animation-delay:17.5s;}
.slider img:nth-child(9){animation-delay:20s;}
.slider img:nth-child(10){animation-delay:22.5s;}

@keyframes fade{
  0%{opacity:0}
  5%{opacity:1}
  20%{opacity:1}
  25%{opacity:0}
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card h3{font-size:14px;color:gray}
.card p{font-size:26px;color:#2563eb;font-weight:bold}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div><b>Lado Women Foundation</b></div>

<div class="menu">
<a onclick="toggle('home')">Home</a>
<a onclick="toggle('committee')">Committee</a>
<a onclick="toggle('district')">District</a>
<a onclick="toggle('projects')">Projects</a>
<a onclick="toggle('admin')">Admin</a>
</div>

</div>

<!-- DROPDOWN SIDEBAR -->
<div class="dropdown" id="panel">

<div id="content"></div>

</div>

<!-- MAIN -->
<div class="main">

<h2>Rajasthan Women Empowerment MIS Dashboard</h2>

<!-- 10 IMAGE SLIDER -->
<div class="slider">

<img src="https://source.unsplash.com/1600x900/?women,training">
<img src="https://source.unsplash.com/1600x900/?rural,women">
<img src="https://source.unsplash.com/1600x900/?education,india">
<img src="https://source.unsplash.com/1600x900/?handicraft,women">
<img src="https://source.unsplash.com/1600x900/?shg,women">
<img src="https://source.unsplash.com/1600x900/?digital,education">
<img src="https://source.unsplash.com/1600x900/?health,women">
<img src="https://source.unsplash.com/1600x900/?children,school">
<img src="https://source.unsplash.com/1600x900/?legal,awareness">
<img src="https://source.unsplash.com/1600x900/?ngo,india">

</div>

<!-- STATS -->
<div class="cards">

<div class="card"><h3>Members</h3><p id="m">0</p></div>
<div class="card"><h3>Districts</h3><p>33</p></div>
<div class="card"><h3>Projects</h3><p>12</p></div>
<div class="card"><h3>Trainings</h3><p>0</p></div>

</div>

</div>

<script>

let panel = document.getElementById("panel");
let content = document.getElementById("content");

function toggle(type){

  panel.style.display="block";

  if(type==="home"){
    content.innerHTML="<h3>Home</h3><p>Women Empowerment Portal</p>";
  }

  if(type==="committee"){
    content.innerHTML=`
    <h3>Committee</h3>
    <div class='item'>National Committee</div>
    <div class='item'>State Committee</div>
    <div class='item'>District Committee</div>
    <div class='item'>Block Committee</div>
    <div class='item'>Gram Panchayat</div>
    <div class='item'>Village Committee</div>
    `;
  }

  if(type==="district"){
    content.innerHTML=`
    <h3>Rajasthan Districts</h3>
    <div class='item'>Jaipur</div>
    <div class='item'>Jodhpur</div>
    <div class='item'>Udaipur</div>
    <div class='item'>Sikar</div>
    <div class='item'>Ajmer</div>
    <div class='item'>Kota</div>
    <div class='item'>Bikaner</div>
    <div class='item'>All Districts...</div>
    `;
  }

  if(type==="projects"){
    content.innerHTML=`
    <h3>Projects</h3>
    <div class='item'>Silai Training</div>
    <div class='item'>Handicrafts</div>
    <div class='item'>Digital Education</div>
    <div class='item'>Health Awareness</div>
    <div class='item'>Legal Awareness</div>
    `;
  }

  if(type==="admin"){
    content.innerHTML="<h3>Admin Panel</h3><p>Login Required</p>";
  }
}

</script>

</body>
</html>
