<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rajasthan NGO MIS Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* Sidebar */
.sidebar{
  width:230px;
  height:100vh;
  background:#111827;
  position:fixed;
  left:0;
  top:0;
  color:white;
  padding:20px;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  color:#cbd5e1;
  text-decoration:none;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
}

.sidebar a:hover{
  background:#374151;
}

/* Main */
.main{
  margin-left:250px;
  padding:20px;
}

.title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

/* Cards */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card h3{
  font-size:14px;
  color:gray;
}

.card p{
  font-size:28px;
  font-weight:bold;
  color:#2563eb;
}

/* Responsive */
@media(max-width:900px){
  .cards{grid-template-columns:1fr 1fr;}
  .main{margin-left:0;}
  .sidebar{position:relative;width:100%;height:auto;}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>NGO MIS</h2>
<a href="dashboard.html">🏠 Dashboard</a>
<a href="member-form.html">➕ Add Member</a>
<a href="members.html">👩 Members</a>
</div>

<div class="main">

<div class="title">Rajasthan Committee Dashboard</div>

<div class="cards">

<div class="card">
<h3>Total Members</h3>
<p id="members">0</p>
</div>

<div class="card">
<h3>State Committee</h3>
<p id="state">0</p>
</div>

<div class="card">
<h3>District Committee</h3>
<p id="district">0</p>
</div>

<div class="card">
<h3>Block Committee</h3>
<p id="block">0</p>
</div>

<div class="card">
<h3>Gram Panchayat</h3>
<p id="gram">0</p>
</div>

<div class="card">
<h3>Village Committee</h3>
<p id="village">0</p>
</div>

<div class="card">
<h3>Trainings</h3>
<p id="training">0</p>
</div>

<div class="card">
<h3>Attendance</h3>
<p id="attendance">0</p>
</div>

</div>

</div>

<script>

// 👇 PUT YOUR APPS SCRIPT URL HERE
const API = "YOUR_SCRIPT_URL_HERE";

async function loadDashboard(){

  try{
    let res = await fetch(API);
    let d = await res.json();

    document.getElementById("members").innerText = d.totalMembers || 0;
    document.getElementById("state").innerText = d.stateCommittee || 0;
    document.getElementById("district").innerText = d.districtCommittee || 0;
    document.getElementById("block").innerText = d.blockCommittee || 0;
    document.getElementById("gram").innerText = d.gramCommittee || 0;
    document.getElementById("village").innerText = d.villageCommittee || 0;
    document.getElementById("training").innerText = d.trainings || 0;
    document.getElementById("attendance").innerText = d.attendance || 0;

  } catch(err){
    console.log("Error:", err);
  }
}

loadDashboard();

</script>

</body>
</html>
