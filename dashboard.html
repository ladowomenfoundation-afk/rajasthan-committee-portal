<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NGO MIS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* TOP HEADER */
.header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
margin:0;
font-size:18px;
}

/* LAYOUT */
.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#1f2937;
color:white;
padding:10px;
}

.sidebar h3{
text-align:center;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin:5px 0;
border-radius:5px;
}

.sidebar a:hover{
background:#374151;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
font-size:13px;
color:gray;
}

.card span{
font-size:24px;
color:#2563eb;
font-weight:bold;
}

/* SEARCH */
.searchBox{
margin:20px 0;
}

input{
padding:10px;
width:300px;
border:1px solid #ccc;
border-radius:5px;
}

/* TABLE */
table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
font-size:13px;
}

th{
background:#2563eb;
color:white;
}

/* CHART */
.chartBox{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">
<h2>Lado Women Foundation - MIS Dashboard</h2>
<div>Admin Panel</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>MENU</h3>

<a onclick="loadMembers()">👩 Members</a>
<a onclick="loadDashboard()">📊 Dashboard</a>
<a onclick="loadChart()">📈 Analytics</a>
<a href="#">🏢 Districts</a>
<a href="#">📚 Training</a>
<a href="#">🧾 Reports</a>
<a href="#">🖼️ Gallery</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- CARDS -->
<div class="cards">

<div class="card">
<h3>Total Members</h3>
<span id="m">0</span>
</div>

<div class="card">
<h3>Districts</h3>
<span>33</span>
</div>

<div class="card">
<h3>Blocks</h3>
<span id="b">0</span>
</div>

<div class="card">
<h3>Trainings</h3>
<span id="t">0</span>
</div>

</div>

<!-- SEARCH -->
<div class="searchBox">
<input type="text" placeholder="Search Member..." onkeyup="searchTable(this.value)">
</div>

<!-- TABLE -->
<table id="table">
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>District</th>
<th>Block</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- CHART -->
<div class="chartBox">
<h3>District Wise Members</h3>
<canvas id="chart"></canvas>
</div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwettPIRLCY97iovedPaKisdtCMiPIc44ZlDfmz7D69n9-bX9JP6x0iRTrMrMAzFgjn/exec";

let allMembers = [];

// ================= DASHBOARD LOAD =================
async function loadDashboard(){

let res = await fetch(API);
let d = await res.json();

document.getElementById("m").innerText = d.totalMembers || 0;
document.getElementById("b").innerText = 0;
document.getElementById("t").innerText = d.trainings || 0;

loadMembers();
}

// ================= MEMBERS =================
async function loadMembers(){

let res = await fetch(API + "?action=members");
allMembers = await res.json();

renderTable(allMembers);
}

// ================= TABLE RENDER =================
function renderTable(data){

let tbody = document.querySelector("#table tbody");
tbody.innerHTML = "";

data.forEach(m => {

tbody.innerHTML += `
<tr>
<td>${m.fullName || ""}</td>
<td>${m.mobile || ""}</td>
<td>${m.district || ""}</td>
<td>${m.block || ""}</td>
</tr>
`;

});

}

// ================= SEARCH =================
function searchTable(value){

let filtered = allMembers.filter(m =>
(m.fullName || "").toLowerCase().includes(value.toLowerCase()) ||
(m.mobile || "").includes(value)
);

renderTable(filtered);
}

// ================= CHART =================
async function loadChart(){

let res = await fetch(API + "?action=charts");
let data = await res.json();

let labels = Object.keys(data.districts);
let values = Object.values(data.districts);

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Members",
data:values,
backgroundColor:"#2563eb"
}]
}
});

}

loadDashboard();
loadChart();

</script>

</body>
</html>
