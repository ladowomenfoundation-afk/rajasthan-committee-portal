<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial;background:#f4f6f9}
.box{background:white;padding:20px;width:300px}
input{width:100%;padding:10px;margin:10px 0}
button{width:100%;padding:10px;background:#2563eb;color:white}
</style>
</head>
<body>

<div class="box">
<h3>Login Portal</h3>

<input id="user" placeholder="User ID">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script>

function login(){

  let u = user.value;
  let p = pass.value;

  // SIMPLE DEMO LOGIN (upgrade later with Google Sheet auth)
  if(u==="director" && p==="1234"){
    localStorage.setItem("role","admin");
    window.location="admin.html";
  }
  else if(u==="member" && p==="1234"){
    localStorage.setItem("role","user");
    window.location="dashboard.html";
  }
  else{
    msg.innerText="Invalid Login";
  }
}

</script>

</body>
</html>
