<!DOCTYPE html>
<html>
<head>
  <title>Member Form</title>
  <style>
    body{font-family:Arial;background:#f4f6f9;display:flex;justify-content:center;align-items:center;height:100vh;}
    .box{background:white;padding:20px;width:320px;border-radius:10px;}
    input{width:100%;padding:10px;margin:8px 0;}
    button{width:100%;padding:10px;background:#2563eb;color:white;border:none;}
    .msg{text-align:center;margin-top:10px;}
  </style>
</head>
<body>

<div class="box">
  <h3>Member Registration</h3>

  <input id="name" placeholder="Name">
  <input id="mobile" placeholder="Mobile">
  <input id="block" placeholder="Block">
  <input id="shg" placeholder="SHG">

  <button onclick="submit()">Submit</button>

  <div class="msg" id="msg"></div>
</div>

<script>

const API = "YOUR_SCRIPT_URL_HERE";

async function submit(){

  let data = {
    name: name.value,
    mobile: mobile.value,
    block: block.value,
    shg: shg.value
  };

  let res = await fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  });

  let result = await res.json();

  if(result.status === "success"){
    msg.innerText = "Saved Successfully";
  } else {
    msg.innerText = "Error";
  }
}

</script>

</body>
</html>
